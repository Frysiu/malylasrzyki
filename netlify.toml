[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NITRO_PRESET = "netlify"
  NODE_VERSION = "20"

# TanStack Start (Nitro) generates the Netlify function and _redirects automatically
# when NITRO_PRESET=netlify. The SPA fallback below is a safety net for any
# unmatched client route.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
